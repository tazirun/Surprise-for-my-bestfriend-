<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend Surprise for Shorna 💙</title>
<style>
body{
  font-family: Arial, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  animation:bgpulse 6s infinite alternate;
  position: relative;
}

@keyframes bgpulse{
  0%{background:#87CEEB;}
  100%{background:#bfe9ff;}
}

h1{
  color:white;
  font-size:28px;
  text-shadow:2px 2px 8px rgba(0,0,0,0.4);
}

button{
  padding:14px 30px;
  font-size:18px;
  margin:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
  position: relative;
}

button:hover{
  transform:scale(1.15);
}

.sure{
  background:#ff5a7a;
  color:white;
}

.nah{
  background:white;
  color:#333;
}

#message{
  margin-top:35px;
  font-size:20px;
  color:white;
  max-width:90%;
  opacity:0;
  transition:1s;
  text-shadow:2px 2px 8px rgba(0,0,0,0.4);
}

.icon{
  position:absolute;
  font-size:28px;
  pointer-events:none;
  animation:float 5s linear forwards;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-700px) scale(1.5);opacity:0;}
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0);}
  100%{transform:translateY(600px) rotate(360deg);}
}
</style>
</head>

<body>

<audio id="bgm" autoplay loop>
  <source src="https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3" type="audio/mpeg">
  <!-- Replace above link with actual "Tera Yaar Hoon Main" mp3 hosted online -->
</audio>

<h1 id="question">You’re my best friend, right Shorna? 😎</h1>

<div id="buttons">
<button class="sure">Sure!</button>
<button class="nah">Nah!</button>
</div>

<div id="message
